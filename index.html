<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Mobile Shotdown</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="rotateNotice">가로 모드로 돌려서 플레이하세요</div>
  <canvas id="game"></canvas>

  <div id="overlay" class="show">
    <h1>MOBILE<br>SHOTDOWN</h1>
    <p>왼쪽 조이스틱: 이동<br>오른쪽 조이스틱: 조준/공격<br>궁극기 버튼: 벽 파괴 산탄</p>
    <button id="startBtn">게임 시작</button>
  </div>

  <div id="hud">
    <div id="teams">남은 팀: 10</div>
    <div id="power">파워큐브: 0</div>
  </div>

  <div id="moveStick" class="stick"><div class="knob"></div></div>
  <div id="aimStick" class="stick aim"><div class="knob"></div></div>
  <button id="ultBtn">궁</button>

  <script src="game.js"></script>
</body>
</html>
