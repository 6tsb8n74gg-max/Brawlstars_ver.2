<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Mobile Shotdown Fixed</title><style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111;color:#fff;font-family:Arial,'Noto Sans KR',sans-serif}canvas{position:fixed;inset:0;width:100vw;height:100vh;background:#69c44a;display:block}#overlay{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;background:linear-gradient(#141629ee,#141629aa);text-shadow:0 4px 0 #0008;padding:20px}#overlay.hide{display:none}h1{font-size:clamp(34px,8vw,74px);letter-spacing:6px;margin:0 0 14px;font-weight:900}p{font-size:clamp(14px,2.7vw,24px);line-height:1.55;margin:8px 0 18px}button{border:0;border-radius:18px;background:#20b84f;color:#fff;font-size:24px;font-weight:900;padding:14px 32px;box-shadow:0 7px 0 #11652d}#hud{position:fixed;left:calc(14px + env(safe-area-inset-left));top:calc(12px + env(safe-area-inset-top));z-index:5;font-size:22px;font-weight:900;text-shadow:0 3px 0 #0008;pointer-events:none}.stick{position:fixed;width:128px;height:128px;border-radius:50%;background:#1c382faa;border:6px solid #ffffff33;z-index:6;bottom:calc(26px + env(safe-area-inset-bottom))}.stick .knob{position:absolute;left:36px;top:36px;width:46px;height:46px;border-radius:50%;background:#6c92e5;border:5px solid #c8d8ff}.move{left:calc(28px + env(safe-area-inset-left))}.aim{right:calc(28px + env(safe-area-inset-right))}.aim .knob{background:#e45c5c;border-color:#ffc8c8}#ult{position:fixed;right:calc(190px + env(safe-area-inset-right));bottom:calc(48px + env(safe-area-inset-bottom));z-index:7;width:92px;height:92px;border-radius:50%;background:#f8aa1c;box-shadow:0 9px 0 #9e6500;font-size:36px}#ult.ready{background:#36b8ff;box-shadow:0 9px 0 #176d98}@media(orientation:portrait){#overlay:after{content:'가로 모드로 돌려서 플레이하세요';font-size:18px;margin-top:10px;color:#ffd74f}}
</style></head><body><canvas id="game"></canvas><div id="hud"><div id="teams">남은 팀: 10</div><div id="power">파워큐브: 0</div></div><div id="overlay"><h1>MOBILE<br>SHOTDOWN</h1><p>왼쪽 조이스틱: 이동<br>오른쪽 조이스틱: 조준 후 놓으면 발사<br>궁극기: 벽 파괴 산탄</p><button id="start">게임 시작</button></div><div id="move" class="stick move"><div class="knob"></div></div><button id="ult">궁</button><div id="aim" class="stick aim"><div class="knob"></div></div><script>
(()=>{const cvs=document.getElementById('game'),ctx=cvs.getContext('2d'),overlay=document.getElementById('overlay'),startBtn=document.getElementById('start'),teamsEl=document.getElementById('teams'),powerEl=document.getElementById('power'),ultBtn=document.getElementById('ult');let W=1,H=1,DPR=1;function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cvs.width=W*DPR;cvs.height=H*DPR;cvs.style.width=W+'px';cvs.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
const MAP={w:4200,h:3000},C={x:2100,y:1500},TAU=Math.PI*2;let state='menu',player=null,bots=[],walls=[],boxes=[],cubes=[],bullets=[],gas={r:2300,t:0},cam={x:0,y:0},last=performance.now();const rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),len=(x,y)=>Math.hypot(x,y),dst=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y),angTo=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x);function hitCircleRect(o,r){let x=clamp(o.x,r.x,r.x+r.w),y=clamp(o.y,r.y,r.y+r.h);return len(o.x-x,o.y-y)<o.r}function blocked(a,b){for(const r of walls){let steps=Math.ceil(dst(a,b)/45);for(let i=1;i<steps;i++){let t=i/steps,x=a.x+(b.x-a.x)*t,y=a.y+(b.y-a.y)*t;if(x>r.x&&x<r.x+r.w&&y>r.y&&y<r.y+r.h)return true}}return false}function canStand(x,y,r=24){let o={x,y,r};return x>r&&y>r&&x<MAP.w-r&&y<MAP.h-r&&!walls.some(w=>hitCircleRect(o,w))&&!boxes.some(b=>len(x-b.x,y-b.y)<r+b.r+12)}function spot(r=24,far=null,dmin=0){for(let i=0;i<4000;i++){let p={x:rnd(260,MAP.w-260),y:rnd(260,MAP.h-260),r};if(canStand(p.x,p.y,r)&&(!far||dst(p,far)>dmin))return p}return{x:C.x,y:C.y,r}}function make(x,y,me=false){return{x,y,r:24,me,dead:false,hp:420,maxHp:420,power:0,ammo:3,ammoT:0,ult:0,aim:0,lastHit:-99,lastAct:-99,speed:330,moveX:0,moveY:0,goal:{x:0,y:0},think:0,shootT:rnd(.2,.8),stuck:0,lx:x,ly:y,detour:rnd(-1,1),color:me?'#8b43d6':'#e84d4d'}}function addPower(e){e.power++;e.maxHp=420+e.power*80;e.hp=Math.min(e.maxHp,e.hp+95)}function dmg(e,u=false){return (u?120:76)+e.power*(u?18:10)}
function build(){walls=[];boxes=[];cubes=[];bullets=[];gas={r:2300,t:0};const safe={x:C.x-430,y:C.y-330,w:860,h:660};for(let i=0;i<38;i++){let w={x:rnd(170,MAP.w-520),y:rnd(150,MAP.h-330),w:rnd(140,360),h:rnd(80,220)};if(!(w.x<safe.x+safe.w&&w.x+w.w>safe.x&&w.y<safe.y+safe.h&&w.y+w.h>safe.y))walls.push(w)}for(let i=0;i<30;i++){let p=spot(35);boxes.push({x:p.x,y:p.y,r:32,hp:230})}player=make(C.x,C.y,true);while(!canStand(player.x,player.y,player.r)){let p=spot(24);player.x=p.x;player.y=p.y}bots=[];for(let i=0;i<9;i++){let p=spot(24,player,850);bots.push(make(p.x,p.y,false))}}
function reset(){build();state='play';overlay.classList.add('hide');startBtn.textContent='다시 플레이';last=performance.now()}startBtn.onclick=reset;
const input={move:{x:0,y:0},aim:{x:0,y:0}};function bind(id,obj,onEnd){const el=document.getElementById(id),knob=el.querySelector('.knob');let pid=null;function center(){let r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}function set(x,y){let c=center(),dx=x-c.x,dy=y-c.y,m=len(dx,dy),mx=39;if(m>mx){dx=dx/m*mx;dy=dy/m*mx}knob.style.left=36+dx+'px';knob.style.top=36+dy+'px';obj.x=dx/mx;obj.y=dy/mx;if(player&&id==='aim'&&len(obj.x,obj.y)>.1)player.aim=Math.atan2(obj.y,obj.x)}function clear(){let v={...obj};obj.x=0;obj.y=0;knob.style.left='36px';knob.style.top='36px';pid=null;onEnd&&onEnd(v)}el.addEventListener('pointerdown',e=>{pid=e.pointerId;el.setPointerCapture(pid);set(e.clientX,e.clientY);e.preventDefault()},{passive:false});el.addEventListener('pointermove',e=>{if(e.pointerId===pid){set(e.clientX,e.clientY);e.preventDefault()}},{passive:false});el.addEventListener('pointerup',e=>{if(e.pointerId===pid){clear();e.preventDefault()}},{passive:false});el.addEventListener('pointercancel',e=>{if(e.pointerId===pid)clear()},{passive:false})}bind('move',input.move);bind('aim',input.aim,v=>{if(state==='play'&&len(v.x,v.y)>.22)shoot(player,Math.atan2(v.y,v.x),false)});function fireUlt(e){e.preventDefault();e.stopPropagation();if(state==='play'&&player)shoot(player,player.aim,true)}ultBtn.addEventListener('pointerdown',fireUlt,{passive:false});
function move(e,dx,dy,dt,face=false){let m=len(dx,dy);if(m>.05){dx/=m;dy/=m}else{dx=dy=0}let oldx=e.x,oldy=e.y,nx=clamp(e.x+dx*e.speed*dt,e.r,MAP.w-e.r),ny=e.y;if(!walls.some(w=>hitCircleRect({x:nx,y:ny,r:e.r},w)))e.x=nx;ny=clamp(e.y+dy*e.speed*dt,e.r,MAP.h-e.r);if(!walls.some(w=>hitCircleRect({x:e.x,y:ny,r:e.r},w)))e.y=ny;if(face&&len(e.x-oldx,e.y-oldy)>.5)e.aim=Math.atan2(dy,dx)}function shoot(e,a,u){if(!e||e.dead)return;if(u){if(e.ult<5)return;e.ult=0}else{if(e.ammo<1)return;e.ammo--;e.ammoT=0}e.lastAct=performance.now()/1000;let n=u?9:5,sp=u?.68:.46;for(let i=0;i<n;i++){let aa=a-sp/2+sp*(n===1?0:i/(n-1));bullets.push({x:e.x+Math.cos(aa)*32,y:e.y+Math.sin(aa)*32,vx:Math.cos(aa)*(u?820:720),vy:Math.sin(aa)*(u?820:720),r:u?7:5,life:u?.52:.38,own:e,d:dmg(e,u),u})}}
function ai(b,dt){let now=performance.now()/1000,en=[player,...bots].filter(e=>e!==b&&!e.dead),vis=en.filter(e=>dst(b,e)<1300&&!blocked(b,e)).sort((a,c)=>dst(b,a)-dst(b,c)),target=vis[0],mode=target?'fight':'farm';if(!target){let cube=cubes.slice().sort((a,c)=>dst(b,a)-dst(b,c))[0],box=boxes.slice().sort((a,c)=>dst(b,a)-dst(b,c))[0];target=cube||box||C;mode=cube?'cube':box?'box':'center'}let gd=dst(b,C);if(gd>gas.r-240){target=C;mode='safe'}let d=dst(b,target),ang=angTo(b,target),da=Math.atan2(Math.sin(ang-b.aim),Math.cos(ang-b.aim));b.aim+=clamp(da,-3.5*dt,3.5*dt);b.think-=dt;if(b.think<=0){b.think=.7+rnd(0,.25);let mx=0,my=0;if(mode==='fight'){if(d>560){mx=Math.cos(ang);my=Math.sin(ang)}else if(d<280){mx=-Math.cos(ang);my=-Math.sin(ang)}else{mx=0;my=0}}else{mx=Math.cos(ang);my=Math.sin(ang)}let tx=b.x+mx*150,ty=b.y+my*150;if((mx||my)&&(!canStand(tx,ty,b.r)||dst({x:tx,y:ty},C)>gas.r-100)){let best={s:-1e9,x:mx,y:my};for(let k=0;k<24;k++){let aa=ang+(k%2?-1:1)*(Math.ceil(k/2)*.28+b.detour),vx=Math.cos(aa),vy=Math.sin(aa),px=b.x+vx*170,py=b.y+vy*170,s=-len(target.x-px,target.y-py);if(!canStand(px,py,b.r))s-=3000;if(dst({x:px,y:py},C)>gas.r-100)s-=3000;s+=120*(vx*b.moveX+vy*b.moveY);if(s>best.s)best={s,x:vx,y:vy}}mx=best.x;my=best.y}b.goal={x:mx,y:my}}b.moveX=b.moveX*.88+b.goal.x*.12;b.moveY=b.moveY*.88+b.goal.y*.12;if(len(b.moveX,b.moveY)<.05){b.moveX=b.moveY=0}move(b,b.moveX,b.moveY,dt,false);if(len(b.x-b.lx,b.y-b.ly)<2&&len(b.moveX,b.moveY)>.2)b.stuck+=dt;else b.stuck=0;if(b.stuck>.9){b.detour+=rnd(-1.2,1.2);b.think=0;b.stuck=0}b.lx=b.x;b.ly=b.y;b.shootT-=dt;let aimOK=Math.abs(Math.atan2(Math.sin(ang-b.aim),Math.cos(ang-b.aim)))<.35;if(b.shootT<=0){if((mode==='fight'||mode==='safe')&&d<690&&target!==C){if(!blocked(b,target)&&aimOK){shoot(b,b.aim,false);b.shootT=.85+rnd(0,.25)}else if(blocked(b,target)&&b.ult>=5){shoot(b,ang,true);b.shootT=1.4}}else if(mode==='box'&&d<460&&!blocked(b,target)&&aimOK){shoot(b,b.aim,false);b.shootT=.95}}}
function update(dt){if(state!=='play'||!player)return;let now=performance.now()/1000;[player,...bots].forEach(e=>{if(e.dead)return;e.ammoT+=dt;if(e.ammo<3&&e.ammoT>=1){e.ammo++;e.ammoT=0}if(now-e.lastHit>3.2&&now-e.lastAct>2.4&&e.hp<e.maxHp)e.hp=Math.min(e.maxHp,e.hp+52*dt)});move(player,input.move.x,input.move.y,dt,false);bots.forEach(b=>!b.dead&&ai(b,dt));for(let i=bullets.length-1;i>=0;i--){let q=bullets[i];q.life-=dt;q.x+=q.vx*dt;q.y+=q.vy*dt;let rem=q.life<=0||q.x<0||q.y<0||q.x>MAP.w||q.y>MAP.h;for(let wi=walls.length-1;wi>=0&&!rem;wi--){let w=walls[wi];if(q.x>w.x&&q.x<w.x+w.w&&q.y>w.y&&q.y<w.y+w.h){if(q.u)walls.splice(wi,1);rem=true}}for(let bi=boxes.length-1;bi>=0&&!rem;bi--){let bx=boxes[bi];if(len(q.x-bx.x,q.y-bx.y)<bx.r+q.r){bx.hp-=q.d;if(q.own&&!q.u)q.own.ult=Math.min(5,q.own.ult+1);if(bx.hp<=0){boxes.splice(bi,1);cubes.push({x:bx.x,y:bx.y,r:16,n:1})}rem=true}}for(const e of [player,...bots])if(!rem&&!e.dead&&e!==q.own&&len(q.x-e.x,q.y-e.y)<e.r+q.r){e.hp-=q.d;e.lastHit=now;if(q.own&&!q.u)q.own.ult=Math.min(5,q.own.ult+1);if(e.hp<=0){e.dead=true;cubes.push({x:e.x,y:e.y,r:16,n:Math.max(1,e.power)})}rem=true}if(rem)bullets.splice(i,1)}[player,...bots].forEach(e=>{if(e.dead)return;for(let i=cubes.length-1;i>=0;i--)if(dst(e,cubes[i])<e.r+28){for(let k=0;k<cubes[i].n;k++)addPower(e);cubes.splice(i,1)}});gas.t+=dt;gas.r=Math.max(560,2300-gas.t*17);if(dst(player,C)>gas.r){player.hp-=100*dt;player.lastHit=now;if(player.hp<=0)player.dead=true}bots.forEach(b=>{if(!b.dead&&dst(b,C)>gas.r-60){let a=angTo(b,C);move(b,Math.cos(a),Math.sin(a),dt*1.8,false);b.hp=Math.max(1,b.hp)}});let alive=[player,...bots].filter(e=>!e.dead);teamsEl.textContent='남은 팀: '+alive.length;powerEl.textContent='파워큐브: '+player.power;ultBtn.classList.toggle('ready',player.ult>=5);if(player.dead)end('패배...');else if(alive.length===1&&alive[0]===player)end('승리!')}function end(t){state='end';overlay.querySelector('h1').innerHTML=t;overlay.querySelector('p').innerHTML='파워큐브 '+player.power+'개 획득';overlay.classList.remove('hide')}
function draw(){ctx.clearRect(0,0,W,H);if(!player){drawMenuBg();return}cam.x=clamp(player.x-W/2,0,Math.max(0,MAP.w-W));cam.y=clamp(player.y-H/2,0,Math.max(0,MAP.h-H));ctx.save();ctx.translate(-cam.x,-cam.y);for(let x=0;x<MAP.w;x+=90)for(let y=0;y<MAP.h;y+=90){ctx.fillStyle=((x/90+y/90)&1)?'#63bd43':'#70ca4d';ctx.fillRect(x,y,90,90)}ctx.save();ctx.fillStyle='rgba(130,45,180,.42)';ctx.fillRect(0,0,MAP.w,MAP.h);ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(C.x,C.y,gas.r,0,TAU);ctx.fill();ctx.restore();ctx.strokeStyle='#a9ff62';ctx.lineWidth=10;ctx.beginPath();ctx.arc(C.x,C.y,gas.r,0,TAU);ctx.stroke();walls.forEach(w=>{ctx.fillStyle='#a85d2b';ctx.fillRect(w.x,w.y,w.w,w.h);ctx.fillStyle='#c77a3d';ctx.fillRect(w.x,w.y,w.w,13)});boxes.forEach(b=>{ctx.fillStyle='#805022';ctx.fillRect(b.x-32,b.y-32,64,64);ctx.fillStyle='#df9a2e';ctx.fillRect(b.x-23,b.y-23,46,46)});cubes.forEach(c=>{ctx.fillStyle='#9c3cff';ctx.fillRect(c.x-16,c.y-16,32,32);ctx.fillStyle='#e8d0ff';ctx.fillRect(c.x-5,c.y-5,10,10)});[...bots,player].forEach(drawB);bullets.forEach(q=>{ctx.fillStyle=q.u?'#ffe45c':'#ffd8a8';ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,TAU);ctx.fill()});ctx.restore()}function drawMenuBg(){ctx.fillStyle='#70ca4d';ctx.fillRect(0,0,W,H);for(let x=0;x<W;x+=90)for(let y=0;y<H;y+=90){ctx.fillStyle=((x/90+y/90)&1)?'#63bd43':'#70ca4d';ctx.fillRect(x,y,90,90)}}function drawB(e){if(e.dead)return;ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.aim);ctx.fillStyle='#2c1739';ctx.fillRect(8,-9,42,18);ctx.fillStyle='#74506b';ctx.fillRect(35,-12,20,24);ctx.restore();ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,TAU);ctx.fill();if(e.me){ctx.fillStyle='#7e35db';ctx.beginPath();ctx.arc(e.x-7,e.y-10,21,0,TAU);ctx.fill();ctx.fillStyle='#ffd34a';ctx.fillRect(e.x-20,e.y+6,40,11);ctx.fillStyle='#ffd1a5';ctx.beginPath();ctx.arc(e.x+4,e.y-5,11,0,TAU);ctx.fill()}else{ctx.fillStyle='#ffd1a5';ctx.fillRect(e.x-11,e.y-8,22,14)}let bw=72,px=e.x-bw/2,py=e.y-52;ctx.fillStyle='#111';ctx.fillRect(px,py,bw,8);ctx.fillStyle=e.hp/e.maxHp>.45?'#37e36d':'#ff4e5a';ctx.fillRect(px,py,bw*(e.hp/e.maxHp),8);for(let i=0;i<3;i++){ctx.fillStyle=i<e.ammo?'#ffd74f':'#222';ctx.fillRect(px+i*25,py+13,21,7)}ctx.fillStyle='#36a4ff';ctx.fillRect(px,py+24,bw*(e.ult/5),5);ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.fillText('◆'+e.power,e.x,py-5)}function loop(t){let dt=Math.min(.033,Math.max(.001,(t-last)/1000));last=t;update(dt);draw();requestAnimationFrame(loop)}document.addEventListener('gesturestart',e=>e.preventDefault());requestAnimationFrame(loop);})();
</script></body></html>
